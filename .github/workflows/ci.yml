name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Foundation checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://pobal:pobal@localhost:5432/pobal?schema=public
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Show tool versions
        run: |
          node --version
          pnpm --version
          docker --version
          docker compose version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and integration tests
        run: pnpm test

      - name: Prisma validate
        run: pnpm prisma:validate

      - name: Production build
        run: pnpm build

      - name: Docker build
        run: docker build .

      - name: Docker Compose config
        run: docker compose config

      - name: Docker Compose PostgreSQL health
        run: |
          set -euo pipefail

          docker compose up -d postgres
          container_id="$(docker compose ps -q postgres)"
          if [ -z "$container_id" ]; then
            echo "No PostgreSQL container id returned by docker compose"
            docker compose ps
            exit 1
          fi

          for attempt in {1..30}; do
            status="$(docker inspect --format='{{.State.Health.Status}}' "$container_id")"
            if [ "$status" = "healthy" ]; then
              echo "PostgreSQL container is healthy"
              exit 0
            fi

            echo "Waiting for PostgreSQL health check: $status"
            sleep 2
          done

          docker compose ps
          docker compose logs postgres
          exit 1

      - name: Docker Compose cleanup
        if: always()
        run: docker compose down -v
