name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Foundation checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pobal
          POSTGRES_USER: pobal
          POSTGRES_PASSWORD: pobal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pobal -d pobal"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      AUTH_SECRET: ci-auth-secret-for-foundation-tests-only
      DATABASE_URL: postgresql://pobal:pobal@localhost:5432/pobal?schema=public
      ENABLE_DEV_AUTH: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Show tool versions
        run: |
          node --version
          pnpm --version
          docker --version
          docker compose version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Prisma generate
        run: pnpm prisma:generate

      - name: Prisma validate
        run: pnpm prisma:validate

      - name: Apply migrations
        run: pnpm prisma:deploy

      - name: Seed foundation data
        run: pnpm prisma:seed

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and integration tests
        run: pnpm test

      - name: Production build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Seed V1 review demo data for e2e
        env:
          SEED_DEMO_DATA: "true"
        run: pnpm prisma:seed

      - name: Playwright smoke tests
        run: pnpm test:e2e

      - name: Docker build
        run: docker build .

      - name: Docker Compose config
        run: docker compose config

      - name: Docker Compose PostgreSQL health
        env:
          POSTGRES_PORT: "55432"
        run: |
          set -euo pipefail

          docker compose up -d postgres
          container_id="$(docker compose ps -q postgres)"
          if [ -z "$container_id" ]; then
            echo "No PostgreSQL container id returned by docker compose"
            docker compose ps
            exit 1
          fi

          for attempt in {1..30}; do
            status="$(docker inspect --format='{{.State.Health.Status}}' "$container_id")"
            if [ "$status" = "healthy" ]; then
              echo "PostgreSQL container is healthy"
              exit 0
            fi

            echo "Waiting for PostgreSQL health check: $status"
            sleep 2
          done

          docker compose ps
          docker compose logs postgres
          exit 1

      - name: Docker Compose cleanup
        if: always()
        run: docker compose down -v
