name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: Foundation checks
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://pobal:pobal@localhost:5432/pobal?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and integration tests
        run: pnpm test

      - name: Prisma validate
        run: pnpm prisma:validate

      - name: Production build
        run: pnpm build

      - name: Docker build
        run: docker build .

      - name: Docker Compose config
        run: docker compose config

      - name: Docker Compose PostgreSQL health
        run: |
          docker compose up -d postgres
          container_id="$(docker compose ps -q postgres)"

          for attempt in {1..30}; do
            status="$(docker inspect --format='{{.State.Health.Status}}' "$container_id")"
            if [ "$status" = "healthy" ]; then
              echo "PostgreSQL container is healthy"
              exit 0
            fi

            echo "Waiting for PostgreSQL health check: $status"
            sleep 2
          done

          docker compose ps
          docker compose logs postgres
          exit 1

      - name: Docker Compose cleanup
        if: always()
        run: docker compose down -v
