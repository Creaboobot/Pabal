services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pobal
      POSTGRES_USER: pobal
      POSTGRES_PASSWORD: pobal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pobal -d pobal"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pobal-postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://pobal:pobal@postgres:5432/pobal?schema=public
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
    ports:
      - "${APP_PORT:-3000}:3000"

  migrate:
    image: node:22.13.1-alpine
    profiles: ["tools"]
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pobal:pobal@postgres:5432/pobal?schema=public
    volumes:
      - .:/app
    command: >
      sh -c "corepack enable &&
      corepack prepare pnpm@9.15.4 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm prisma:deploy"

  seed:
    image: node:22.13.1-alpine
    profiles: ["tools"]
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pobal:pobal@postgres:5432/pobal?schema=public
    volumes:
      - .:/app
    command: >
      sh -c "corepack enable &&
      corepack prepare pnpm@9.15.4 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm prisma:seed"

volumes:
  pobal-postgres-data:
